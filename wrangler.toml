name = "physics-site"
compatibility_date = "2024-04-03"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "physics-blog-db"
database_id = "your-database-id-here" # User will need to run wrangler d1 create physics-blog-db to get this

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "physics-blog-assets"
